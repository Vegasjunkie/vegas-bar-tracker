<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegas Gaming Bar Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#09090e;--surface:#111118;--surface2:#18181f;--surface3:#1f1f28;
  --border:#252530;--border2:#32323f;
  --accent:#f0c040;--accent2:#e05050;--green:#3dd68c;--blue:#5b8def;
  --text:#e8e8f0;--muted:#6a6a8a;--muted2:#4a4a65;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px;}

/* HEADER */
.app-header{
  background:linear-gradient(180deg,#0d0d14 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
  padding:1.25rem 1rem 1rem;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);
}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:.75rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 30px rgba(240,192,64,.3);line-height:1;}
.logo-sub{font-size:11px;letter-spacing:2px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:300;margin-top:2px;display:block;}
.progress-wrap{flex:1;max-width:280px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.4px;}

const TYPE_LABELS = {vp:"Video Poker / Bar", live:"Live Tables + Bar", bar:"Bar im Casino"};
const TYPE_CSS = {vp:"type-vp", live:"type-live", bar:"type-bar"};

let bars = [];
let currentArea = 'all';
let currentCasino = 'all';
let currentFilter = 'all';
let editingNote = null;

function save() {
  try { localStorage.setItem('vegas_tracker_v3', JSON.stringify(bars)); } catch(e){}
}
function load() {
  try {
    const r = localStorage.getItem('vegas_tracker_v3');
    bars = r ? JSON.parse(r) : JSON.parse(JSON.stringify(BARS));
  } catch(e) { bars = JSON.parse(JSON.stringify(BARS)); }
  buildCasinoTabs();
  render();
}

function getCasinos() {
  return [...new Set(
    bars.filter(b => currentArea === 'all' || b.area === currentArea).map(b => b.casino)
  )];
}

function buildCasinoTabs() {
  const casinos = getCasinos();
  const tc = document.getElementById('casino-tabs');
  tc.innerHTML = `<button class="casino-tab active" onclick="setCasino('all',this)">Alle Casinos</button>` +
    casinos.map(c => `<button class="casino-tab" onclick="setCasino(${JSON.stringify(c)},this)">${c}</button>`).join('');
}

function setArea(a, el) {
  currentArea = a;
  currentCasino = 'all';
  document.querySelectorAll('.area-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  buildCasinoTabs();
  render();
}

function setCasino(c, el) {
  currentCasino = c;
  document.querySelectorAll('.casino-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  let filtered = bars.filter(b => {
    if (currentArea !== 'all' && b.area !== currentArea) return false;
    if (currentCasino !== 'all' && b.casino !== currentCasino) return false;
    if (currentFilter === 'visited' && !b.visited) return false;
    if (currentFilter === 'unvisited' && b.visited) return false;
    if (q && !b.name.toLowerCase().includes(q) && !b.casino.toLowerCase().includes(q)) return false;
    return true;
  });

  const total = bars.length;
  const visited = bars.filter(b=>b.visited).length;
  const pct = total ? Math.round(visited/total*100) : 0;

  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${visited} von ${total} besucht`;
  document.getElementById('prog-pct').textContent = pct + '%';

  const stripV = bars.filter(b=>b.area==='strip'&&b.visited).length;
  const stripT = bars.filter(b=>b.area==='strip').length;
  const dtV = bars.filter(b=>b.area==='downtown'&&b.visited).length;
  const dtT = bars.filter(b=>b.area==='downtown').length;
  const locV = bars.filter(b=>b.area==='local'&&b.visited).length;
  const locT = bars.filter(b=>b.area==='local').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat">Strip <strong>${stripV}/${stripT}</strong></div>
    <div class="stat">Downtown <strong>${dtV}/${dtT}</strong></div>
    <div class="stat">Local <strong>${locV}/${locT}</strong></div>
  `;

  const groups = {};
  filtered.forEach(b => { if(!groups[b.casino]) groups[b.casino]=[]; groups[b.casino].push(b); });

  const list = document.getElementById('bar-list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">Keine Bars gefunden.</div>'; return; }

  list.innerHTML = Object.entries(groups).map(([casino, cbars]) => {
    const cVisited = cbars.filter(b=>b.visited).length;
    return `<div class="casino-group">
      <div class="casino-label">${casino} <span class="casino-count">${cVisited}/${cbars.length}</span></div>
      ${cbars.map(b => {
        const stars = [1,2,3,4,5].map(s =>
          `<span class="star ${b.rating>=s?'lit':''}" onclick="setRating(${b.id},${s})">★</span>`
        ).join('');
        let noteSection = '';
        if (editingNote === b.id) {
          noteSection = `<textarea class="note-input" id="note-${b.id}" placeholder="Notizen..." onblur="saveNote(${b.id})">${b.note}</textarea>`;
        } else if (b.note) {
          noteSection = `<div class="note-preview" onclick="startEdit(${b.id})">${b.note.length>100?b.note.slice(0,100)+'…':b.note}</div>`;
        } else {
          noteSection = `<div class="note-empty" onclick="startEdit(${b.id})">+ Notiz</div>`;
        }
        const typeLabel = TYPE_LABELS[b.type]||b.type;
        const typeCss = TYPE_CSS[b.type]||'';
        return `<div class="bar-card ${b.visited?'visited':''}" id="card-${b.id}">
          <div class="bar-top">
            <div class="bar-info">
              <div class="bar-name" title="${b.name}">${b.name}</div>
              <div class="bar-meta"><span class="type-tag ${typeCss}">${typeLabel}</span></div>
            </div>
            <div class="bar-actions">
              <div class="stars">${stars}</div>
              <button class="visit-btn ${b.visited?'done':''}" onclick="toggleVisit(${b.id})">${b.visited?'✓ Besucht':'Offen'}</button>
              <button class="icon-btn" onclick="openEdit(${b.id})">···</button>
            </div>
          </div>
          ${noteSection}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function toggleVisit(id) { const b=bars.find(x=>x.id===id); if(b){b.visited=!b.visited;save();render();} }
function setRating(id,r) { const b=bars.find(x=>x.id===id); if(b){b.rating=b.rating===r?0:r;save();render();} }
function startEdit(id) { editingNote=id;render();setTimeout(()=>{const el=document.getElementById('note-'+id);if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},50); }
function saveNote(id) { const el=document.getElementById('note-'+id);const b=bars.find(x=>x.id===id);if(b&&el)b.note=el.value;editingNote=null;save();render(); }

function openAdd() {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>Bar hinzufügen</h2>
        <div class="form-group"><label>Name der Bar</label><input type="text" id="m-name" placeholder="z.B. Center Bar"></div>
        <div class="form-group"><label>Casino</label><input type="text" id="m-casino" placeholder="z.B. Bellagio"></div>
        <div class="form-group"><label>Bereich</label>
          <select id="m-area"><option value="strip">Strip</option><option value="downtown">Downtown</option><option value="local">Local Casino</option></select>
        </div>
        <div class="form-group"><label>Typ</label>
          <select id="m-type"><option value="vp">Video Poker / Bar</option><option value="live">Live Tables + Bar</option><option value="bar">Bar im Casino</option></select>
        </div>
        <div class="modal-btns">
          <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
          <button class="btn-save" onclick="addBar()">Hinzufügen</button>
        </div>
      </div>
    </div>`;
}

function addBar() {
  const name = document.getElementById('m-name').value.trim();
  const casino = document.getElementById('m-casino').value.trim();
  if(!name||!casino) return;
  const newId = bars.length ? Math.max(...bars.map(b=>b.id))+1 : 1;
  bars.push({id:newId,name,casino,area:document.getElementById('m-area').value,type:document.getElementById('m-type').value,visited:false,rating:0,note:''});
  save();closeModal();buildCasinoTabs();render();
}

function openEdit(id) {
  const b = bars.find(x=>x.id===id); if(!b) return;
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>Bearbeiten</h2>
        <div class="form-group"><label>Name</label><input type="text" id="m-name" value="${b.name.replace(/"/g,'&quot;')}"></div>
        <div class="form-group"><label>Casino</label><input type="text" id="m-casino" value="${b.casino.replace(/"/g,'&quot;')}"></div>
        <div class="form-group"><label>Bereich</label>
          <select id="m-area"><option value="strip" ${b.area==='strip'?'selected':''}>Strip</option><option value="downtown" ${b.area==='downtown'?'selected':''}>Downtown</option><option value="local" ${b.area==='local'?'selected':''}>Local Casino</option></select>
        </div>
        <div class="form-group"><label>Typ</label>
          <select id="m-type"><option value="vp" ${b.type==='vp'?'selected':''}>Video Poker / Bar</option><option value="live" ${b.type==='live'?'selected':''}>Live Tables + Bar</option><option value="bar" ${b.type==='bar'?'selected':''}>Bar im Casino</option></select>
        </div>
        <div class="modal-btns">
          <button class="btn-del" onclick="deleteBar(${id})">Löschen</button>
          <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
          <button class="btn-save" onclick="saveEdit(${id})">Speichern</button>
        </div>
      </div>
    </div>`;
}

function saveEdit(id) {
  const b = bars.find(x=>x.id===id);
  if(b){b.name=document.getElementById('m-name').value.trim()||b.name;b.casino=document.getElementById('m-casino').value.trim()||b.casino;b.area=document.getElementById('m-area').value;b.type=document.getElementById('m-type').value;save();}
  closeModal();render();
}

function deleteBar(id) {
  if(!confirm('Löschen?')) return;
  bars=bars.filter(x=>x.id!==id);save();closeModal();buildCasinoTabs();render();
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

load();
</script>
